<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Facility</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header> 
        <h1>MJ Facility</h1>
        <nav>
            <ul>
                <li><a href="#">Lance tes dés</a></li>
                <li><a href="#">Mon profil</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="container">
        <h2>Lance tes dés !</h2>
        <div>
            <label>D4:</label>
            <input type="number" min="0" max="10" id="d4" value="1">
        </div>
        <div>
            <label>D6:</label>
            <input type="number" min="0" max="10" id="d6" value="1">
        </div>
        <div>
            <label>D8:</label>
            <input type="number" min="0" max="10" id="d8" value="1">
        </div>
        <div>
            <label>D10:</label>
            <input type="number" min="0" max="10" id="d10" value="1">
        </div>
        <div>
            <label>D12:</label>
            <input type="number" min="0" max="10" id="d12" value="1">
        </div>
        <div>
            <label>D20:</label>
            <input type="number" min="0" max="10" id="d20" value="1">
        </div>
        <div>
            <label>D100:</label>
            <input type="number" min="0" max="10" id="d100" value="1">
        </div>
        <button onclick="rollDice()">Lancer</button>
        <button onclick="resetDice()">Effacer</button>
        <div id="diceResult"></div>
        <div id="diceImages"></div>
    </div>
    </main>
    <footer>
        <p>&copy; 2026 MJ Facility. Tous droits réservés.</p>
    </footer>
</body>
</html>
